{% extends 'base.html' %}

{% block title %}Delete Discount - School Management System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-0 shadow-sm mt-5">
            <div class="card-body text-center py-5">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
                </div>
                <h4 class="mb-3">Delete Discount Category?</h4>
                <p class="text-muted">
                    Are you sure you want to delete <strong>{{ object.name }}</strong>?
                    This will remove the discount from all students.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <a href="{% url 'finance:discount_category_list' %}" class="btn btn-outline-secondary px-4">
                            Cancel
                        </a>
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-2"></i>Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
