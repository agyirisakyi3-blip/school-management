{% extends 'base.html' %}

{% block title %}Request Leave - School Management{% endblock %}

{% block page_title %}Request Leave{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">
                    <i class="bi bi-calendar-plus text-primary me-2"></i>
                    Request Leave
                </h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">{{ form.leave_type.label }}</label>
                            {{ form.leave_type }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ form.start_date.label }}</label>
                            {{ form.start_date }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ form.end_date.label }}</label>
                            {{ form.end_date }}
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">{{ form.reason.label }}</label>
                            {{ form.reason }}
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>Submit Request
                        </button>
                        <a href="{% url 'leaves:dashboard' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg me-2"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
