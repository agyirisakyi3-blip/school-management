{% extends 'base.html' %}

{% block title %}Delete Book - School Management System{% endblock %}

{% block page_title %}Delete Book{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
                <p class="text-muted">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'library:book_list' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-2"></i>Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
